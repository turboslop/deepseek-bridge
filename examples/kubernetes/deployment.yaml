---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepseek-bridge
  labels:
    app.kubernetes.io/name: deepseek-bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: deepseek-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deepseek-bridge
    spec:
      terminationGracePeriodSeconds: 360
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: deepseek-bridge
          image: ghcr.io/turboslop/deepseek-bridge:latest
          imagePullPolicy: IfNotPresent
          args:
            - --runtime-mode
            - kubernetes
            - --host
            - 0.0.0.0
            - --port
            - "9000"
            - --tunnel
            - none
          env:
            - name: DEEPSEEK_BRIDGE_STORAGE_BACKEND
              value: valkey
            - name: DEEPSEEK_BRIDGE_VALKEY_KEY_PREFIX
              value: deepseek-bridge
            - name: DEEPSEEK_BRIDGE_VALKEY_URL
              valueFrom:
                secretKeyRef:
                  name: deepseek-bridge-valkey
                  key: url
          ports:
            - name: http
              containerPort: 9000
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: deepseek-bridge
  labels:
    app.kubernetes.io/name: deepseek-bridge
spec:
  selector:
    app.kubernetes.io/name: deepseek-bridge
  ports:
    - name: http
      port: 9000
      targetPort: http
