{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "deepseek-bridge.fullname" . }}
  labels:
    {{- include "deepseek-bridge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "deepseek-bridge.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  ingress:
    - ports:
        - protocol: TCP
          port: http
      {{- with .Values.networkPolicy.ingress.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    {{- with .Values.networkPolicy.egress.rules }}
    {{- toYaml . | nindent 4 }}
    {{- else }}
    []
    {{- end }}
  {{- end }}
{{- end }}
