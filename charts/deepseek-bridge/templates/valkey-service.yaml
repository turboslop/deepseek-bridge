{{- if .Values.valkey.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "deepseek-bridge.fullname" . }}-valkey
  labels:
    {{- include "deepseek-bridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
  {{- with .Values.valkey.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: valkey
      port: {{ .Values.valkey.service.port }}
      targetPort: valkey
      protocol: TCP
  selector:
    {{- include "deepseek-bridge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
{{- end }}
