apiVersion: v1
kind: Service
metadata:
  name: {{ include "deepseek-bridge.fullname" . }}
  labels:
    {{- include "deepseek-bridge.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      {{- with .Values.service.appProtocol }}
      appProtocol: {{ . | quote }}
      {{- end }}
  selector:
    {{- include "deepseek-bridge.selectorLabels" . | nindent 4 }}
