{{- if and (eq (lower .Values.storage.backend) "valkey") .Values.valkey.url (not .Values.valkey.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deepseek-bridge.valkeySecretName" . }}
  labels:
    {{- include "deepseek-bridge.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.valkey.existingSecretKey }}: {{ .Values.valkey.url | quote }}
{{- end }}
