---
name: CI

"on":
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --python 3.14

      - name: Check formatting
        run: uv run black --check --diff src/ tests/

      - name: Check lint
        run: uv run ruff check src/deepseek_bridge tests/

      - name: Check pycodestyle
        run: uv run pycodestyle --max-line-length=80 --ignore=E203,W503 src/deepseek_bridge tests/

      - name: Check pylint
        run: uv run pylint src/deepseek_bridge

      - name: Check types
        run: uv run mypy src/deepseek_bridge

      - name: Check YAML
        run: uv run yamllint .github .pre-commit-config.yaml .yamllint.yaml

  unit-test:
    name: Unit test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run unit tests with coverage
        run: |
          uv run coverage run -m unittest discover -s tests -v
          uv run coverage report

  functional-test:
    name: Functional test (ubuntu-latest, Python 3.14, Valkey)
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379/tcp
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --python 3.14

      - name: Run functional tests
        env:
          RUN_FUNCTIONAL_TESTS: "1"
          FUNCTIONAL_VALKEY_URL: redis://127.0.0.1:${{ job.services.valkey.ports[6379] }}/0
        run: >-
          uv run --extra dev --python 3.14 python -m unittest discover
          -s tests/functional -v

  k8s-minikube-smoke:
    name: Kubernetes smoke (Minikube)
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-test
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Kubernetes tooling
        env:
          HELM_VERSION: v3.16.4
          KUBECTL_VERSION: v1.31.4
          MINIKUBE_VERSION: v1.34.0
        run: |
          set -euo pipefail
          curl_retry=(curl --fail --silent --show-error --location \
            --retry 5 --retry-delay 2 --retry-all-errors)

          "${curl_retry[@]}" -o /tmp/helm.tar.gz \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          "${curl_retry[@]}" -o /tmp/helm.tar.gz.sha256sum \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz.sha256sum"
          helm_sha="$(awk '{print $1}' /tmp/helm.tar.gz.sha256sum)"
          echo "${helm_sha}  /tmp/helm.tar.gz" | sha256sum --check
          tar -xzf /tmp/helm.tar.gz -C /tmp
          sudo install /tmp/linux-amd64/helm /usr/local/bin/helm

          "${curl_retry[@]}" -o /tmp/kubectl \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          "${curl_retry[@]}" -o /tmp/kubectl.sha256 \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
          kubectl_sha="$(awk '{print $1}' /tmp/kubectl.sha256)"
          echo "${kubectl_sha}  /tmp/kubectl" | sha256sum --check
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl

          "${curl_retry[@]}" -o /tmp/minikube \
            "https://storage.googleapis.com/minikube/releases/${MINIKUBE_VERSION}/minikube-linux-amd64"
          "${curl_retry[@]}" -o /tmp/minikube.sha256 \
            "https://storage.googleapis.com/minikube/releases/${MINIKUBE_VERSION}/minikube-linux-amd64.sha256"
          minikube_sha="$(awk '{print $1}' /tmp/minikube.sha256)"
          echo "${minikube_sha}  /tmp/minikube" | sha256sum --check
          sudo install -m 0755 /tmp/minikube /usr/local/bin/minikube

          helm version
          kubectl version --client=true
          minikube version

      - name: Run Minikube smoke test
        env:
          DEEPSEEK_BRIDGE_RUN_K8S_SMOKE: "1"
          DEEPSEEK_BRIDGE_SMOKE_IMAGE_REPOSITORY: deepseek-bridge-smoke
          DEEPSEEK_BRIDGE_SMOKE_IMAGE_TAG: ci-${{ github.sha }}-${{ github.run_id }}
        run: python -m unittest tests.test_k8s_minikube_smoke -v
