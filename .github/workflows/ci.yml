---
name: CI

"on":
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --python 3.14

      - name: Check formatting
        run: uv run black --check --diff src/ tests/

      - name: Check lint
        run: uv run ruff check src/deepseek_bridge tests/

      - name: Check pycodestyle
        run: uv run pycodestyle --max-line-length=80 --ignore=E203,W503 src/deepseek_bridge tests/

      - name: Check pylint
        run: uv run pylint src/deepseek_bridge

      - name: Check types
        run: uv run mypy src/deepseek_bridge

      - name: Check YAML
        run: uv run yamllint .github .pre-commit-config.yaml .yamllint.yaml

  unit-test:
    name: Unit test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run unit tests with coverage
        run: |
          uv run coverage run -m unittest discover -s tests -v
          uv run coverage report
