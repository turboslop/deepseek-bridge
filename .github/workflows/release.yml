---
name: Release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --python 3.14

      - name: Check formatting
        run: uv run black --check --diff src/ tests/

      - name: Check lint
        run: uv run ruff check src/deepseek_bridge tests/

      - name: Check pycodestyle
        run: uv run pycodestyle --max-line-length=80 --ignore=E203,W503 src/deepseek_bridge tests/

      - name: Check pylint
        run: uv run pylint src/deepseek_bridge

      - name: Check types
        run: uv run mypy src/deepseek_bridge

      - name: Check YAML
        run: uv run yamllint .github .pre-commit-config.yaml .yamllint.yaml

  unit-test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run unit tests with coverage
        run: |
          uv run coverage run -m unittest discover -s tests -v
          uv run coverage report

  functional-test:
    name: Functional test (ubuntu-latest, Python 3.14, Valkey)
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379/tcp
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --python 3.14

      - name: Run functional tests
        env:
          RUN_FUNCTIONAL_TESTS: "1"
          FUNCTIONAL_VALKEY_URL: redis://127.0.0.1:${{ job.services.valkey.ports[6379] }}/0
        run: >-
          uv run --extra dev --python 3.14 python -m unittest discover
          -s tests/functional -v

  publish:
    name: Publish to PyPI
    needs: [lint, unit-test, functional-test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/deepseek-bridge

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false
