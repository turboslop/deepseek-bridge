---
services:
  bridge:
    build:
      context: .
      args:
        PACKAGE_VERSION: ${DEEPSEEK_BRIDGE_E2E_PACKAGE_VERSION:-0.0.0+litellm-e2e}
    environment:
      DEEPSEEK_BRIDGE_RUNTIME_MODE: kubernetes
      DEEPSEEK_BRIDGE_HOST: 0.0.0.0
      DEEPSEEK_BRIDGE_PORT: "9000"
      DEEPSEEK_BRIDGE_UPSTREAM_BASE_URL: https://api.deepseek.com
      DEEPSEEK_BRIDGE_UPSTREAM_MODEL: deepseek-v4-pro
      DEEPSEEK_BRIDGE_THINKING: enabled
      DEEPSEEK_BRIDGE_REASONING_EFFORT: max
      DEEPSEEK_BRIDGE_MISSING_REASONING_STRATEGY: reject
      DEEPSEEK_BRIDGE_DISPLAY_REASONING: "false"
      DEEPSEEK_BRIDGE_LOG_FORMAT: json
      DEEPSEEK_BRIDGE_METRICS_ENABLED: "true"
    ports:
      - "${DEEPSEEK_BRIDGE_E2E_BRIDGE_PORT:-19000}:9000"

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-latest}
    command:
      - --config
      - /app/config.yaml
      - --host
      - 0.0.0.0
      - --port
      - "4000"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?set DEEPSEEK_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-e2e}
    volumes:
      - ./e2e/litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "${DEEPSEEK_BRIDGE_E2E_LITELLM_PORT:-14000}:4000"
    depends_on:
      bridge:
        condition: service_started

  e2e:
    image: python:3.14-slim
    environment:
      BRIDGE_READY_URL: http://bridge:9000/readyz
      LITELLM_BASE_URL: http://litellm:4000/v1
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-e2e}
      LITELLM_E2E_TIMEOUT_SECONDS: ${LITELLM_E2E_TIMEOUT_SECONDS:-240}
    volumes:
      - ./e2e/litellm:/e2e:ro
    command:
      - python
      - /e2e/litellm_bridge_deepseek_e2e.py
    depends_on:
      bridge:
        condition: service_started
      litellm:
        condition: service_started
